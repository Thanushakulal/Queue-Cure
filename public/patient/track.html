<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Track My Token - Queue Cure '26</title>
  <meta name="description" content="Track your queue position, estimated wait time, and live status in real-time.">
  <link rel="stylesheet" href="../shared/common.css">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(13, 148, 136, 0.12), transparent 50%),
                  radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.95), var(--slate-950));
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .track-header {
      height: 60px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .track-header .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .track-header .logo-wrap svg {
      width: 26px; height: 26px; fill: var(--teal-500);
    }
    .track-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    .track-container {
      flex: 1;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Hero Status Card */
    .hero-status-card {
      text-align: center;
      padding: 36px 24px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(20, 184, 166, 0.2);
      background: radial-gradient(circle at center, rgba(13, 148, 136, 0.1), rgba(30, 41, 59, 0.45));
    }
    .hero-status-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--teal-400), transparent);
    }
    .your-token-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--teal-400);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .your-token-number {
      font-family: var(--font-heading);
      font-size: 5.5rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow: 0 0 40px rgba(45, 212, 191, 0.3);
      margin-bottom: 12px;
      transition: all 0.4s ease;
    }
    .your-name-display {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--slate-100);
      margin-bottom: 16px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      transition: all 0.4s ease;
    }
    .status-pill.waiting { background: rgba(245,158,11,0.15); color: var(--amber-400); border: 1px solid rgba(245,158,11,0.3); }
    .status-pill.approaching { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.3); animation: pulse-glow-orange 2s infinite; }
    .status-pill.consultation { background: rgba(20,184,166,0.15); color: var(--teal-400); border: 1px solid rgba(20,184,166,0.3); animation: pulse-glow 2s infinite; }
    .status-pill.completed { background: rgba(16,185,129,0.15); color: var(--mint-400); border: 1px solid rgba(16,185,129,0.3); }
    .status-pill.skipped { background: rgba(239,68,68,0.15); color: var(--rose-400); border: 1px solid rgba(239,68,68,0.3); }
    .status-pill.not-found { background: rgba(148, 163, 184, 0.1); color: var(--slate-300); border: 1px solid rgba(148,163,184,0.2); }
    @keyframes pulse-glow-orange {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.2); }
      50% { box-shadow: 0 0 12px 4px rgba(251, 146, 60, 0.35); }
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .info-box {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      transition: border-color 0.3s ease;
    }
    .info-box.highlight {
      border-color: rgba(20, 184, 166, 0.25);
      background: rgba(20, 184, 166, 0.05);
    }
    .info-box-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--slate-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .info-box-val {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      transition: all 0.3s ease;
    }
    .info-box-sub {
      font-size: 0.75rem;
      color: var(--slate-700);
      margin-top: 2px;
    }

    /* Serving Now Card */
    .serving-now-card {
      padding: 18px 20px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.45);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .serving-now-card-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--teal-400);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .serving-now-card-token {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 800;
      color: #ffffff;
    }

    /* Progress Bar */
    .progress-section { }
    .progress-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--slate-300);
      margin-bottom: 8px;
    }
    .progress-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, var(--teal-600), var(--teal-400));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(45, 212, 191, 0.4);
    }

    /* Prediction Confidence Badge */
    .prediction-card {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .prediction-icon {
      width: 32px; height: 32px;
      background: rgba(20,184,166,0.1);
      border: 1px solid rgba(20,184,166,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .prediction-text {
      flex: 1;
    }
    .prediction-text strong {
      font-size: 0.85rem;
      color: var(--teal-400);
      font-weight: 600;
    }
    .prediction-text p {
      font-size: 0.8rem;
      color: var(--slate-300);
      margin-top: 2px;
      line-height: 1.4;
    }
    .confidence-bar-mini {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, var(--teal-600), var(--mint-400));
      transition: width 0.6s ease;
    }

    /* Message Card */
    .message-card {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--slate-100);
      line-height: 1.55;
      transition: all 0.3s ease;
    }
    .message-card.info { background: rgba(30,41,59,0.4); border: 1px solid rgba(255,255,255,0.05); }
    .message-card.approaching { background: rgba(251, 146, 60, 0.08); border: 1px solid rgba(251, 146, 60, 0.25); color: #fed7aa; }
    .message-card.go-now { background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.3); color: var(--teal-400); font-weight: 700; font-size: 1.05rem; text-align: center; }
    .message-card.done { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: var(--mint-400); text-align: center; }

    /* Last Called Timer */
    .last-called-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--slate-700);
      justify-content: center;
    }
    .last-called-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal-500);
      animation: sync-pulse 2s infinite;
    }

    /* Toast Notification System */
    #toast-container {
      position: fixed;
      top: 70px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: toast-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      pointer-events: all;
      backdrop-filter: blur(12px);
      border: 1px solid;
    }
    .toast.approach { background: rgba(251, 146, 60, 0.9); color: #fff; border-color: #fb923c; }
    .toast.call { background: rgba(20, 184, 166, 0.9); color: var(--slate-950); border-color: var(--teal-400); }
    .toast.info { background: rgba(30, 41, 59, 0.95); color: var(--slate-100); border-color: rgba(255,255,255,0.1); }
    .toast.exit { animation: toast-out 0.3s ease forwards; }
    @keyframes toast-in {
      from { transform: translateX(120%) scale(0.85); opacity: 0; }
      to { transform: translateX(0) scale(1); opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateX(0) scale(1); opacity: 1; }
      to { transform: translateX(120%) scale(0.85); opacity: 0; }
    }

    /* Not Found State */
    .not-found-card {
      text-align: center;
      padding: 40px 24px;
    }
    .not-found-emoji { font-size: 3rem; margin-bottom: 12px; }
    .not-found-card h3 { color: var(--slate-300); font-size: 1.2rem; margin-bottom: 8px; }
    .not-found-card p { font-size: 0.9rem; color: var(--slate-700); }

    /* Loading Spinner */
    .spinner {
      text-align: center;
      padding: 60px;
      color: var(--slate-700);
      font-size: 0.9rem;
    }

    /* Sync dot bottom */
    .bottom-sync {
      text-align: center;
      padding: 8px 0 24px;
      font-size: 0.75rem;
      color: var(--slate-700);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #bottom-sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rose-500);
    }
    #bottom-sync-dot.connected {
      background: var(--mint-500);
      animation: sync-pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <header class="track-header">
    <a href="../" class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M19 10.5V20H5V4h9v5.5h5M14 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9l-7-7m-1 9h-2v2h2v-2m0 4h-2v2h2v-2m3-4h-2v2h2v-2m0 4h-2v2h2v-2m1.5-7c-.8 0-1.5.7-1.5 1.5S17.7 11 18.5 11 20 10.3 20 9.5 19.3 8 18.5 8Z"/></svg>
      <h1>Queue Cure '26</h1>
    </a>
    <div class="sync-badge">
      <div id="sync-dot" class="sync-dot"></div>
      <span id="sync-text">Connecting...</span>
    </div>
  </header>

  <div id="toast-container"></div>

  <div class="track-container" id="track-container">
    <div class="spinner">Loading your queue status...</div>
  </div>

  <div class="bottom-sync">
    <div id="bottom-sync-dot"></div>
    <span id="bottom-sync-text">Live Sync Connecting...</span>
  </div>

  <script>
    // Parse URL Params
    const params = new URLSearchParams(window.location.search);
    const patientId = params.get('id');
    const tokenNumber = params.get('token') ? parseInt(params.get('token'), 10) : null;

    let queueState = null;
    let ws = null;
    let reconnectTimeout = null;
    let lastAnnouncedServingToken = null;
    let lastAlertedTwoAhead = false;

    // ─── Toast System ──────────────────────────────────────────────────────────
    function showToast(message, type = 'info', duration = 4500) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('exit');
        setTimeout(() => toast.remove(), 350);
      }, duration);
    }

    // ─── Audio ─────────────────────────────────────────────────────────────────
    function playChime(urgent = false) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = urgent ? [523.25, 659.25, 783.99] : [659.25, 880.00];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
          gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
          gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i * 0.15 + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.15 + 0.65);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.65);
        });
      } catch (e) {}
    }

    // ─── Voice Announce ────────────────────────────────────────────────────────
    function announce(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const en = voices.find(v => v.lang.startsWith('en'));
        if (en) utt.voice = en;
        utt.rate = 0.9;
        window.speechSynthesis.speak(utt);
      }
    }

    // ─── Sync Status ──────────────────────────────────────────────────────────
    function setSyncStatus(connected) {
      const dot = document.getElementById('sync-dot');
      const text = document.getElementById('sync-text');
      const bdot = document.getElementById('bottom-sync-dot');
      const btext = document.getElementById('bottom-sync-text');
      if (connected) {
        dot.className = 'sync-dot connected';
        text.textContent = 'Live';
        bdot.className = 'connected';
        btext.textContent = 'Live WebSocket Connected';
      } else {
        dot.className = 'sync-dot';
        text.textContent = 'Offline';
        bdot.className = '';
        btext.textContent = 'Reconnecting...';
      }
    }

    // ─── WebSocket ────────────────────────────────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen = () => { setSyncStatus(true); if (reconnectTimeout) clearTimeout(reconnectTimeout); };
      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);
        if (data.event === 'INITIAL_STATE' || data.event === 'QUEUE_UPDATE') {
          const prev = queueState;
          queueState = data.state;
          renderPage(prev);
        } else if (data.event === 'CALL_PATIENT') {
          if (tokenNumber && data.patient.token_number === tokenNumber) {
            playChime(true);
            announce(`Token ${tokenNumber}, please proceed to the consultation room now.`);
            showToast('🚨 Your turn! Please proceed to the consultation room.', 'call', 7000);
          }
        }
      };
      ws.onclose = () => {
        setSyncStatus(false);
        reconnectTimeout = setTimeout(connectWS, 3000);
      };
    }

    // ─── Main Render ──────────────────────────────────────────────────────────
    function renderPage(prevState) {
      if (!tokenNumber) {
        renderNotFound('No token number provided. Please scan your QR code again.');
        return;
      }
      if (!queueState) return;

      const container = document.getElementById('track-container');

      // Determine patient status and data
      let patientStatus = 'not-found';
      let tokensAhead = 0;
      let patientName = '';
      let patientData = null;

      // Check active patient
      if (queueState.activePatient && queueState.activePatient.token_number === tokenNumber) {
        patientStatus = 'consultation';
        patientName = queueState.activePatient.patient_name;
        patientData = queueState.activePatient;
        tokensAhead = 0;
      } else {
        const idx = queueState.waitingList.findIndex(p => p.token_number === tokenNumber);
        if (idx !== -1) {
          patientStatus = 'waiting';
          patientData = queueState.waitingList[idx];
          patientName = patientData.patient_name;
          tokensAhead = idx; // 0 means next in line, 1 means one ahead
          // Check approach alert (2 or fewer ahead)
          if (tokensAhead <= 2 && tokensAhead > 0 && !lastAlertedTwoAhead) {
            lastAlertedTwoAhead = true;
            playChime(false);
            showToast(`⏰ Your turn is approaching — ${tokensAhead} patient${tokensAhead > 1 ? 's' : ''} ahead of you!`, 'approach', 6000);
          }
          if (tokensAhead > 2) lastAlertedTwoAhead = false;
        } else {
          const completed = queueState.completedList.find(p => p.token_number === tokenNumber);
          if (completed) {
            patientStatus = completed.status === 'COMPLETED' ? 'completed' : 'skipped';
            patientName = completed.patient_name;
            patientData = completed;
          }
        }
      }

      // Check if currently serving token changed — alert user
      const nowServing = queueState.stats.currentServing;
      if (prevState && nowServing && nowServing !== lastAnnouncedServingToken) {
        lastAnnouncedServingToken = nowServing;
        if (patientStatus === 'waiting') {
          const idx2 = queueState.waitingList.findIndex(p => p.token_number === tokenNumber);
          if (idx2 !== -1 && idx2 <= 2) {
            showToast(`Token #${nowServing} is now being served. You are close!`, 'info', 3500);
          }
        }
      }

      // Compute wait time with smart prediction
      const avgDur = queueState.stats.avgDurationMinutes || queueState.settings.average_consultation_time || 5;
      const estWaitMins = (patientStatus === 'waiting') ? Math.max(0, tokensAhead * avgDur) : 0;
      const confidence = queueState.stats.predictionConfidence || 0;
      const smartCount = queueState.stats.smartCount || 0;

      const totalRegistered = queueState.stats.totalToday || 1;
      const totalDone = queueState.stats.completed || 0;
      const progressPct = Math.round((totalDone / Math.max(totalRegistered, 1)) * 100);

      // Build status classes
      const statusClasses = { waiting: 'waiting', consultation: 'consultation', completed: 'completed', skipped: 'skipped', 'not-found': 'not-found' };
      const statusTexts = { waiting: '⏳ Waiting', consultation: '🩺 In Consultation', completed: '✅ Completed', skipped: '⚠️ Skipped', 'not-found': '🔍 Not Found' };
      if (patientStatus === 'waiting' && tokensAhead === 0) {
        statusTexts.waiting = '⭐ You Are Next!';
      } else if (patientStatus === 'waiting' && tokensAhead <= 2) {
        statusTexts.waiting = '⏰ Approaching!';
        statusClasses.waiting = 'approaching';
      }

      const messageContent = getMessageContent(patientStatus, tokensAhead, patientName);

      container.innerHTML = `
        <div class="glass-card hero-status-card">
          <p class="your-token-label">Your Token</p>
          <div class="your-token-number">${tokenNumber}</div>
          ${patientName ? `<p class="your-name-display">${patientName}</p>` : ''}
          <div class="status-pill ${statusClasses[patientStatus] || 'not-found'}">${statusTexts[patientStatus] || 'Not Found'}</div>
        </div>

        ${patientStatus === 'waiting' || patientStatus === 'consultation' ? `
        <div class="info-grid">
          <div class="info-box ${tokensAhead === 0 ? 'highlight' : ''}">
            <div class="info-box-label">Tokens Ahead</div>
            <div class="info-box-val">${tokensAhead}</div>
            <div class="info-box-sub">${tokensAhead === 0 ? 'You are next!' : 'patients before you'}</div>
          </div>
          <div class="info-box">
            <div class="info-box-label">Est. Wait</div>
            <div class="info-box-val" style="font-size: ${estWaitMins >= 10 ? '1.5rem' : '2rem'};">${patientStatus === 'consultation' ? 'Now' : `${estWaitMins < 1 ? '<1' : Math.round(estWaitMins)} min`}</div>
            <div class="info-box-sub">${patientStatus === 'consultation' ? 'In Consultation' : `~${avgDur} min avg`}</div>
          </div>
        </div>
        ` : ''}

        ${(nowServing) ? `
        <div class="serving-now-card">
          <div class="serving-now-card-label">🟢 Now Serving</div>
          <div class="serving-now-card-token">Token #${nowServing}</div>
        </div>
        ` : ''}

        ${(patientStatus === 'waiting' || patientStatus === 'consultation') && totalRegistered > 0 ? `
        <div class="progress-section glass-card" style="padding: 16px 20px;">
          <div class="progress-label-row">
            <span>Today's Progress</span>
            <span>${totalDone} / ${totalRegistered} served (${progressPct}%)</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width: ${progressPct}%;"></div>
          </div>
        </div>
        ` : ''}

        ${confidence > 0 && smartCount >= 1 && patientStatus === 'waiting' ? `
        <div class="prediction-card">
          <div class="prediction-icon">🧠</div>
          <div class="prediction-text">
            <strong>Smart Prediction Active</strong>
            <p>Based on last ${smartCount} consultation${smartCount > 1 ? 's' : ''} (avg ${avgDur} min). Wait estimate is <strong>${confidence >= 70 ? 'reliable' : confidence >= 40 ? 'moderate' : 'approximate'}</strong>.</p>
            <div class="confidence-bar-mini">
              <div class="confidence-fill" style="width: ${confidence}%;"></div>
            </div>
          </div>
        </div>
        ` : ''}

        <div class="message-card ${messageContent.cls}">${messageContent.text}</div>

        ${patientStatus === 'not-found' ? `
        <div class="glass-card not-found-card">
          <div class="not-found-emoji">🔍</div>
          <h3>Token Not Found</h3>
          <p>Token #${tokenNumber} was not found for today's session. Please verify your receipt or visit reception.</p>
        </div>
        ` : ''}

        <div class="last-called-row">
          <div class="last-called-dot"></div>
          <span>Live updates via WebSocket</span>
        </div>
      `;
    }

    function getMessageContent(status, ahead, name) {
      if (status === 'consultation') return { cls: 'go-now', text: `🚨 It is your turn, ${name || 'please'}! Proceed to the consultation room now.` };
      if (status === 'completed') return { cls: 'done', text: '✅ Your consultation is complete. Thank you for your visit!' };
      if (status === 'skipped') return { cls: 'info', text: '⚠️ Your token was marked as skipped. Please speak to the receptionist to recall your token.' };
      if (status === 'waiting' && ahead === 0) return { cls: 'approaching', text: '⭐ You are next in line! Please stand by near the consultation room doorway and be ready.' };
      if (status === 'waiting' && ahead <= 2) return { cls: 'approaching', text: `⏰ Your turn is approaching! Only ${ahead} patient${ahead > 1 ? 's' : ''} ahead. Please move closer to the consultation room.` };
      if (status === 'waiting') return { cls: 'info', text: `Please remain seated in the waiting lobby. You will be notified when your turn approaches.` };
      return { cls: 'info', text: 'Token status could not be determined. Please check with reception.' };
    }

    function renderNotFound(msg) {
      const container = document.getElementById('track-container');
      container.innerHTML = `
        <div class="glass-card not-found-card">
          <div class="not-found-emoji">🔍</div>
          <h3>Invalid QR Code</h3>
          <p>${msg}</p>
        </div>
      `;
    }

    // ─── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      try {
        const res = await fetch('/api/queue');
        if (res.ok) {
          queueState = await res.json();
          renderPage(null);
        }
      } catch (e) {}
      connectWS();
    }
    init();
  </script>
</body>
</html>
