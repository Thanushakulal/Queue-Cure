version: '3.8'

services:
  queue-cure:
    build: .
    container_name: queue_cure_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_FILE=/app/data/queue.db
      - NODE_ENV=production
    volumes:
      - queue_data:/app/data
    restart: unless-stopped

volumes:
  queue_data:
